<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公众号封面生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      color: #fff;
      margin-bottom: 10px;
      font-size: 24px;
    }

    .subtitle {
      color: #888;
      margin-bottom: 30px;
      font-size: 14px;
    }

    /* 封面画布 - 900x383px */
    .cover-container {
      width: 900px;
      height: 383px;
      position: relative;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      background-size: cover;
      background-position: center;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border-radius: 8px;
    }

    /* 渐变遮罩 */
    .cover-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to right,
        rgba(0,0,0,0.7) 0%,
        rgba(0,0,0,0.5) 40%,
        rgba(0,0,0,0.3) 70%,
        transparent 100%
      );
    }

    /* 内容区域 */
    .cover-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 65%;
      text-align: left;
      z-index: 10;
    }

    /* 主标题 - 自适应字号 */
    .cover-title {
      font-size: 52px;
      font-weight: 900;
      color: #fff;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
      line-height: 1.3;
      margin-bottom: 15px;
      letter-spacing: 2px;
      word-break: break-all;
    }

    /* 副标题 */
    .cover-subtitle {
      font-size: 24px;
      font-weight: 400;
      color: #e0e0e0;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      line-height: 1.5;
    }

    /* 控制面板 */
    .controls {
      margin-top: 40px;
      background: #16213e;
      padding: 30px;
      border-radius: 12px;
      width: 900px;
      max-width: 100%;
    }

    .controls h2 {
      color: #fff;
      font-size: 18px;
      margin-bottom: 20px;
    }

    .control-group {
      margin-bottom: 20px;
    }

    .control-group label {
      display: block;
      color: #aaa;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .control-group input[type="text"],
    .control-group textarea {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #0f3460;
      color: #fff;
      font-size: 16px;
      font-family: inherit;
    }

    .control-group textarea {
      resize: vertical;
      min-height: 60px;
    }

    .control-group input[type="file"] {
      display: none;
    }

    .file-btn {
      display: inline-block;
      padding: 12px 24px;
      background: #667eea;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }

    .file-btn:hover {
      background: #764ba2;
    }

    .color-picker {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .color-option {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.2s, border-color 0.2s;
    }

    .color-option:hover {
      transform: scale(1.1);
    }

    .color-option.active {
      border-color: #fff;
    }

    .btn-group {
      display: flex;
      gap: 15px;
      margin-top: 25px;
    }

    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .btn-secondary {
      background: #333;
      color: #fff;
    }

    .tips {
      margin-top: 20px;
      padding: 15px;
      background: #0f3460;
      border-radius: 6px;
      color: #aaa;
      font-size: 13px;
      line-height: 1.6;
    }

    .tips strong {
      color: #667eea;
    }
  </style>
</head>
<body>
  <h1>公众号封面生成器</h1>
  <p class="subtitle">尺寸：900 x 383px | 编辑文字和配色后下载</p>

  <!-- 封面预览区域 -->
  <div class="cover-container" id="cover">
    <div class="cover-overlay"></div>
    <div class="cover-content">
      <div class="cover-title" id="titlePreview">AI 革命已来</div>
      <div class="cover-subtitle" id="subtitlePreview">普通人如何抓住这波红利？</div>
    </div>
  </div>

  <!-- 控制面板 -->
  <div class="controls">
    <h2>配置面板</h2>

    <div class="control-group">
      <label>主标题（建议 4-12 字）</label>
      <input type="text" id="titleInput" value="AI 革命已来" maxlength="20" placeholder="输入主标题">
    </div>

    <div class="control-group">
      <label>副标题（可选）</label>
      <textarea id="subtitleInput" maxlength="50" placeholder="输入副标题">普通人如何抓住这波红利？</textarea>
    </div>

    <div class="control-group">
      <label>预设配色方案</label>
      <div class="color-picker">
        <div class="color-option active" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" data-bg="linear-gradient(135deg, #667eea 0%, #764ba2 100%)"></div>
        <div class="color-option" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);" data-bg="linear-gradient(135deg, #f093fb 0%, #f5576c 100%)"></div>
        <div class="color-option" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);" data-bg="linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)"></div>
        <div class="color-option" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);" data-bg="linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)"></div>
        <div class="color-option" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);" data-bg="linear-gradient(135deg, #fa709a 0%, #fee140 100%)"></div>
        <div class="color-option" style="background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);" data-bg="linear-gradient(135deg, #30cfd0 0%, #330867 100%)"></div>
        <div class="color-option" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);" data-bg="linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)"></div>
        <div class="color-option" style="background: #1a1a2e;" data-bg="#1a1a2e"></div>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="downloadCover()">下载封面 PNG</button>
      <button class="btn btn-secondary" onclick="resetCover()">重置</button>
    </div>

    <div class="tips">
      <strong>使用技巧：</strong><br>
      1. 修改文字后封面实时更新，主标题建议控制在 12 字以内<br>
      2. 点击"下载封面"保存为 900x383 PNG，直接上传公众号后台<br>
      3. Ctrl+S 也可以快速下载
    </div>
  </div>

  <script>
    const cover = document.getElementById('cover');
    const titleInput = document.getElementById('titleInput');
    const subtitleInput = document.getElementById('subtitleInput');
    const titlePreview = document.getElementById('titlePreview');
    const subtitlePreview = document.getElementById('subtitlePreview');
    const colorOptions = document.querySelectorAll('.color-option');

    // 实时更新标题
    titleInput.addEventListener('input', (e) => {
      titlePreview.textContent = e.target.value || '主标题';
    });

    // 实时更新副标题
    subtitleInput.addEventListener('input', (e) => {
      subtitlePreview.textContent = e.target.value || '';
    });

    // 配色方案切换
    colorOptions.forEach(option => {
      option.addEventListener('click', () => {
        colorOptions.forEach(o => o.classList.remove('active'));
        option.classList.add('active');
        cover.style.background = option.getAttribute('data-bg');
      });
    });

    // 解析 CSS gradient 字符串为 canvas gradient
    function parseGradientToCanvas(ctx, gradientStr, width, height) {
      // 匹配 linear-gradient(135deg, #xxx 0%, #yyy 100%) 格式
      var match = gradientStr.match(/linear-gradient\((\d+)deg,\s*(#[0-9a-fA-F]{6})\s*(\d+)%,\s*(#[0-9a-fA-F]{6})\s*(\d+)%\)/);
      if (match) {
        var angle = parseInt(match[1]) * Math.PI / 180;
        var color1 = match[2];
        var color2 = match[4];

        var x0 = width / 2 - Math.cos(angle) * width / 2;
        var y0 = height / 2 - Math.sin(angle) * height / 2;
        var x1 = width / 2 + Math.cos(angle) * width / 2;
        var y1 = height / 2 + Math.sin(angle) * height / 2;

        var gradient = ctx.createLinearGradient(x0, y0, x1, y1);
        gradient.addColorStop(0, color1);
        gradient.addColorStop(1, color2);
        return gradient;
      }
      return gradientStr;
    }

    // 真正的下载功能：用 Canvas 渲染封面并导出 PNG
    function downloadCover() {
      var canvas = document.createElement('canvas');
      canvas.width = 900;
      canvas.height = 383;
      var ctx = canvas.getContext('2d');

      // 绘制背景
      var bgStyle = cover.style.background || getComputedStyle(cover).backgroundImage;
      if (bgStyle && bgStyle !== 'none') {
        var gradient = parseGradientToCanvas(ctx, bgStyle, 900, 383);
        ctx.fillStyle = gradient;
      } else {
        ctx.fillStyle = '#667eea';
      }
      ctx.fillRect(0, 0, 900, 383);

      // 绘制渐变遮罩
      var overlay = ctx.createLinearGradient(0, 0, 900, 0);
      overlay.addColorStop(0, 'rgba(0,0,0,0.7)');
      overlay.addColorStop(0.4, 'rgba(0,0,0,0.5)');
      overlay.addColorStop(0.7, 'rgba(0,0,0,0.3)');
      overlay.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = overlay;
      ctx.fillRect(0, 0, 900, 383);

      // 绘制标题
      var title = titlePreview.textContent;
      var subtitle = subtitlePreview.textContent;

      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 6;
      ctx.shadowOffsetX = 3;
      ctx.shadowOffsetY = 3;

      ctx.fillStyle = '#ffffff';
      ctx.font = '900 52px -apple-system, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif';
      ctx.textBaseline = 'middle';

      // 计算文本区域（居中偏左，宽度 65%）
      var textX = 900 * 0.175;
      var maxWidth = 900 * 0.65;
      var lineHeight = 52 * 1.3;

      // 处理标题换行
      var titleLines = wrapText(ctx, title, maxWidth);
      var totalHeight = titleLines.length * lineHeight + (subtitle ? 15 + 24 : 0);
      var startY = (383 - totalHeight) / 2;

      titleLines.forEach(function(line, i) {
        ctx.fillText(line, textX, startY + i * lineHeight);
      });

      // 绘制副标题
      if (subtitle) {
        ctx.shadowBlur = 4;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;
        ctx.fillStyle = '#e0e0e0';
        ctx.font = '400 24px -apple-system, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif';
        ctx.fillText(subtitle, textX, startY + titleLines.length * lineHeight + 15);
      }

      ctx.restore();

      // 触发下载
      var link = document.createElement('a');
      link.download = 'cover-' + Date.now() + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // 文字换行辅助函数
    function wrapText(ctx, text, maxWidth) {
      var lines = [];
      var currentLine = '';
      for (var i = 0; i < text.length; i++) {
        var testLine = currentLine + text[i];
        if (ctx.measureText(testLine).width > maxWidth && currentLine) {
          lines.push(currentLine);
          currentLine = text[i];
        } else {
          currentLine = testLine;
        }
      }
      if (currentLine) lines.push(currentLine);
      return lines;
    }

    // 重置
    function resetCover() {
      titleInput.value = 'AI 革命已来';
      subtitleInput.value = '普通人如何抓住这波红利？';
      titlePreview.textContent = 'AI 革命已来';
      subtitlePreview.textContent = '普通人如何抓住这波红利？';
      cover.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
      colorOptions.forEach(o => o.classList.remove('active'));
      colorOptions[0].classList.add('active');
    }

    // 键盘快捷键
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        downloadCover();
      }
    });
  </script>
</body>
</html>
